name: Auto WP Publisher Bot

on:
  schedule:
    # Günde 2 defa çalışır. (UTC saatine göredir. Türkiye saati ile sabah 09:00 ve akşam 18:00)
    - cron: '0 6,15 * * *'
  workflow_dispatch: # Senin yaptığın gibi manuel tetikleme butonu

env:
  # Ekran görüntüsündeki Node.js 20 uyarısını tamamen çözen kod:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Botun keywords.txt dosyasını güncelleyebilmesi için gerekli izin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run Publisher Script
        env:
          # Python kodundaki os.getenv() komutları bu sırları (Secrets) çekecek
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          # Aşağıdakileri Secrets'a eklemediyseniz doğrudan kodun içinde de kalabilir, 
          # ancak buraya eklediyseniz başındaki '#' işaretini kaldırın.
          # WP_URL: ${{ secrets.WP_URL }}
          # WP_USER: ${{ secrets.WP_USER }}
        run: python main.py

      - name: Commit and Push Updated Keywords
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.txt
          # Sadece dosyada bir değişiklik varsa (kelime silindiyse) commit atar
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: Auto-removed published keyword [skip ci]" && git push)
