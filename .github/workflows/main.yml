name: Auto WP Publisher Bot

on:
  schedule:
    # Günde 2 defa çalışır. (UTC saatine göredir. Türkiye saati ile sabah 09:00 ve akşam 18:00)
    - cron: '0 6,15 * * *'
  workflow_dispatch: # Manuel tetikleme butonu

env:
  # Node.js 20 uyarılarını global olarak çözen kod:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Botun keywords.txt dosyasını güncelleyebilmesi için gerekli izin

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run Publisher Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
        run: python main.py

      - name: Commit and Push Updated Keywords
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.txt
          # Sadece dosyada bir değişiklik varsa (kelime silindiyse) commit atar
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: Auto-removed published keyword [skip ci]" && git push)
