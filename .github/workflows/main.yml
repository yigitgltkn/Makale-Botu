name: Otomatik WordPress Blog Botu

on:
  schedule:
    # ABD Doğu Saati (EDT - Yaz Saati) baz alınarak: 
    # Akşam 6 (18:00 EDT -> 22:00 UTC)
    # Gece 10 (22:00 EDT -> 02:00 UTC)
    - cron: '0 2,22 * * *'
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    
    # EKLENEN KISIM 1: Botun depoya dosya yükleyebilmesi için yazma izni
    permissions:
      contents: write 

    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.3'

      - name: Kutuphaneleri Yukle
        run: |
          pip install google-genai requests

      - name: Scripti Calistir
        run: python main.py
        # EĞER ŞİFRELERİNİ GITHUB SECRETS'A KOYDUYSAN BURAYI AÇ (Güvenlik için şiddetle tavsiye ederim)
        # env:
        #   GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # EKLENEN KISIM 2: Kullanılan kelimeyi txt dosyasından silip GitHub'a geri kaydetme
      - name: Kullanilan Kelimeyi Sil ve Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.txt
          git commit -m "Auto-update: Kullanilan kelime silindi [skip ci]" || echo "Değişiklik yok"
          git push
