name: Auto WP Publisher Bot

on:
  schedule:
    - cron: '0 6,15 * * *'
  workflow_dispatch:

jobs:
  publish_article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Python sürümünüzü buraya entegre ettik
          python-version: '3.14' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai

      - name: Run Publisher Script
        run: python main.py

      - name: Commit and Push Updated Keywords
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "bot: Auto-removed published keyword [skip ci]" && git push)
